replicaCount: 2

image:
  repository: ghcr.io/your-org/wealthforge-web
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: app.wealthforge.ai
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: wealthforge-tls
      hosts:
        - app.wealthforge.ai

env:
  - name: NODE_ENV
    value: "production"
  - name: PAYSTACK_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: wealthforge-secrets
        key: paystack-secret-key
  - name: STRIPE_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: wealthforge-secrets
        key: stripe-secret-key
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: wealthforge-secrets
        key: database-url

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

nodeSelector: {}
tolerations: []
affinity: {}