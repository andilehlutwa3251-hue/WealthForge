name: Log Failed Deployments

on:
  workflow_run:
    workflows: 
      - "Deploy to Vercel"
      - "Deploy to Kubernetes (ArgoCD)"
    types:
      - completed
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target'
        required: true
        default: 'vercel'
        type: choice
        options:
          - vercel
          - argocd
          - kubernetes
      failure_type:
        description: 'Failure category'
        required: true
        default: 'deployment-failed'
      error_details:
        description: 'Error message or link to logs'
        required: false

jobs:
  log-failure:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' || 
      github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Prepare failure log
        id: prepare-log
        run: |
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          DEPLOY_TARGET="${{ github.event.inputs.deploy_target || 'vercel' }}"
          FAILURE_TYPE="${{ github.event.inputs.failure_type || 'deployment-failed' }}"

          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            ERROR_DETAILS="Workflow '${{ github.event.workflow_run.name }}' failed.\nConclusion: ${{ github.event.workflow_run.conclusion }}\nRun URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            COMMIT="${{ github.event.workflow_run.head_sha }}"
          else
            ERROR_DETAILS="${{ github.event.inputs.error_details || 'Manual failure log triggered.' }}"
            BRANCH="${{ github.ref_name }}"
            COMMIT="${{ github.sha }}"
          fi

          LOG_FILE="deployment-logs/${DEPLOY_TARGET}-${FAILURE_TYPE}-${TIMESTAMP}.md"

          mkdir -p deployment-logs

          cat > "$LOG_FILE" << EOF
# Deployment Failure Log

**Date**: $(date)
**Target**: $DEPLOY_TARGET
**Failure Type**: $FAILURE_TYPE
**Branch**: $BRANCH
**Commit**: $COMMIT

## Error Details
$ERROR_DETAILS

## Recommended Next Steps
- Review full logs in the linked workflow run
- Check environment variables and secrets
- For Vercel 404s: Validate routes, next.config.js, and trailing slashes
- For ArgoCD/K8s: Check pod status, image tags, and Helm values

---
*Auto-generated by Wealth OS Failure Logger*
EOF

          echo "log_file=$LOG_FILE" >> $GITHUB_OUTPUT
          echo "✅ Failure log prepared: $LOG_FILE"

      - name: Commit and push log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment-logs/
          git commit -m "chore: Auto-log failed deployment (${{ steps.prepare-log.outputs.deploy_target || 'unknown' }})" || echo "No new changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}